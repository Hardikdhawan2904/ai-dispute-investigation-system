agent:
  name: ARIA
  full_name: Automated Resolution Intelligence Agent
  version: "2.0.0"
  domain: BFSI — Banking, Financial Services & Insurance

  role: >
    Senior AI Dispute Analyst embedded in the bank's internal dispute operations
    platform. ARIA receives raw customer dispute submissions (already saved to DB),
    runs 3 pre-computed tools server-side before the LLM call, and produces a
    structured investigation brief for the human dispute resolution team.

  goal: >
    Classify every inbound dispute into exactly one of 9 dispute categories,
    assess fraud suspicion, assign a priority level (CRITICAL / HIGH / MEDIUM / LOW),
    generate risk tags, compute a calibrated confidence score, and return a
    fully structured JSON case record — ready for immediate DB storage and
    analyst review.

  backstory: >
    ARIA was designed after the bank's dispute operations team was overwhelmed
    by high case volumes, inconsistent manual triage, and slow fraud escalation.
    In v2.0, ARIA shifted to a DB-first evidence model — score_fraud_indicators
    now queries account_events for bank-verified signals before trusting form
    answers. Unverifiable customer claims (otp_shared, bank_impersonation,
    remote_access) are still processed but carry only 60% weight.

  constraints:
    - Factual analysis only — no legal or financial advice
    - Never fabricates transaction details not present in the input
    - Returns ONLY valid parseable JSON — no prose, no markdown
    - Every dispute treated with equal seriousness regardless of amount
    - Governed by RBI dispute resolution guidelines and BFSI audit standards
    - Confidence uncertainty expressed numerically, never suppressed
    - COMPLIANCE_AGENT removed — high-risk tags trigger escalation, not a separate agent

  data_flow: >
    Form data is saved to dispute_cases DB table BEFORE ARIA runs.
    ARIA reads from DB (not the raw form). Customer/transaction fields
    (email, phone, amount, merchant) are overwritten from DB at submission
    time — ARIA never trusts user-supplied values for these fields.

  # ── LLM config ────────────────────────────────────────────────────────────────
  llm:
    provider: Groq
    model: llama-3.1-8b-instant
    temperature: 0
    max_tokens: 1024
    retry_attempts: 2
    retry_wait: exponential (min 1s, max 5s)

  # ── LangGraph ─────────────────────────────────────────────────────────────────
  langgraph:
    framework: LangGraph (StateGraph)
    pattern: Pre-execution pipeline — all 3 tools run server-side before LLM call
    state_schema: DisputeAgentState

    pipeline:
      entry_point: validate
      agent_tools:
        - assess_transaction_context
        - score_fraud_indicators
        - verify_evidence_match
      # compute_confidence_score was removed — confidence is now calculated
      # deterministically in finalize_node from parsed tool outputs

    nodes:
      - validate        # extract case_id from submission
      - build_evidence  # run 3 tools server-side, format prompt, mask PII
      - agent           # single LLM call (tools already pre-computed)
      - finalize        # parse LLM JSON, stamp server fields, compute confidence

  # ── Tools ─────────────────────────────────────────────────────────────────────
  tools:
    - name: assess_transaction_context
      description: >
        Assesses transaction context from submitted form data.
        Checks: amount tier (RBI thresholds), off-hours flag (11PM–5AM),
        card-not-present risk, weekend flag, international merchant patterns.
        Reads: amount, transaction_type, merchant, transaction_date, transaction_time.
        Source: form values (factual timestamps, not interpretable customer claims).

    - name: score_fraud_indicators
      description: >
        DB-FIRST fraud signal scorer. Queries account_events table first,
        then falls back to form flags with reduced weight.

        DB signals (full weight — bank-verified):
          SIM_SWAP_DETECTED         → sim_swap_suspected form field replaced
          DEVICE_REGISTERED         → new device confirmation
          MOBILE_NUMBER_CHANGED     → mobile change confirmation
          CARD_LOST_REPORTED        → card_lost form field replaced
          CARD_BLOCKED              → card_blocked protective action
          OTP_DELIVERED             → otp_received form field replaced
          CUSTOMER_CONTACT_LOGGED   → bank_contacted protective action
          UPI_COLLECT_REQUEST_RECEIVED → collect_request form field replaced

        Form-only signals (60% weight — unverifiable customer claims):
          otp_shared, bank_impersonation, remote_access,
          screen_sharing, phishing_link, device_lost

        Output scores used for:
          1. LLM prompt context (entire output string)
          2. confidence_score adjustment in finalize_node:
             CRITICAL/HIGH + fraud category = +0.15
             MEDIUM + fraud category        = +0.08
             CRITICAL/HIGH + wrong category = -0.12

    - name: verify_evidence_match
      description: >
        Verifies whether submitted document OCR text supports the customer's claim.
        Uses amount matching (±5%), merchant name matching, and keyword signals.
        Returns: MATCH | PARTIAL_MATCH | MISMATCH | NO_DOCUMENTS | CANNOT_VERIFY.
        Source: uploaded file OCR text extracted server-side before ARIA runs.

  # ── Risk Tags ─────────────────────────────────────────────────────────────────
  risk_tags:
    # Stamped server-side (deterministic — LLM cannot add/remove these)
    HIGH_VALUE_TRANSACTION:    "amount >= 50,000"
    INTERNATIONAL_TRANSACTION: "merchant country != IN or transaction_type includes foreign"
    POSSIBLE_FRAUD:            "fraud_suspicion = true"
    SUSPICIOUS_BEHAVIOR:       "sim_swap_suspected = true in form"
    RECURRING_DISPUTE:         "dispute_reason contains subscription/recurring keywords"

    # Card POS / ATM specific — stripped for Card POS and ATM channels
    DEVICE_MISMATCH: "New device detected (stripped for Card POS and ATM)"

    # LLM-generated (validated server-side — invalid ones stripped)
    OTP_COMPROMISED:         "Customer reported OTP shared with third party"
    FRIENDLY_FRAUD_RISK:     "Pattern of repeated disputes or delivery-confirmed returns"
    HIGH_PRIORITY_CASE:      "Priority is CRITICAL or HIGH"
    VELOCITY_BREACH:         "Multiple transactions in short window"
    MERCHANT_BLACKLISTED:    "Merchant known for scam activity (keyword match)"
    DUPLICATE_PAYMENT:       "Transaction appears to be a duplicate"

  # ── Output schema ─────────────────────────────────────────────────────────────
  output:
    format: JSON dict (DisputeCase)
    fields:
      case_id:                 "Unique identifier for this dispute case"
      customer_id:             "Bank customer identifier"
      transaction_id:          "Transaction reference number"
      dispute_category:        "One of 9 canonical BFSI dispute categories"
      fraud_suspicion:         "Boolean — true if fraud indicators are present"
      fraud_selected:          "Boolean — customer ticked fraud in form"
      priority:                "CRITICAL | HIGH | MEDIUM | LOW"
      confidence_score:        "Float [0.0, 1.0] — server-computed from tool outputs"
      confidence_factors:      "List of human-readable lines explaining the score"
      risk_tags:               "List of applicable risk signal tags"
      key_findings:            "3-5 structured findings from LLM analysis"
      case_summary:            "2-3 sentence plain-language summary of customer claim"
      conclusion:              "Single analyst-action recommendation sentence"
      evidence_match:          "MATCH | PARTIAL_MATCH | MISMATCH | NO_DOCUMENTS | CANNOT_VERIFY"
      evidence_match_note:     "1-2 sentence note on document relevance"
      status:                  "Always 'Dispute Raised' on initial creation"

  dispute_categories:
    - Unauthorized Transaction
    - Duplicate Transaction
    - Refund Not Received
    - Product Not Received
    - Subscription Abuse
    - ATM Cash Issue
    - Merchant Dispute
    - Friendly Fraud
    - Other

  # ── Invocation ────────────────────────────────────────────────────────────────
  invocation:
    entry_function: run_dispute_agent
    file: agents/dispute_agent/__init__.py
    signature: "run_dispute_agent(dispute_input: dict, document_texts: List[str]) -> dict"
    called_from:
      - "services/dispute_understanding_fallback_service.py (background workflow)"
      - "api/routes/ops_cases.py → reanalyse endpoint"
