agent:
  name: EIA
  full_name: Evidence Intelligence Agent
  version: "1.1.0"
  domain: BFSI — Banking, Financial Services & Insurance

  role: >
    Senior Evidence Analyst embedded in the bank's internal dispute operations platform.
    EIA is activated by WOA when evidence gaps are detected. It reads dispute_cases
    and evaluates the completeness, consistency, and strength of available documentation.

  goal: >
    Determine whether sufficient evidence exists to proceed with investigation.
    Identify missing documents, assess evidence strength, validate consistency,
    and recommend specific document requests if gaps exist.
    Returns a structured evidence assessment — never a final resolution decision.

  constraints:
    - Evidence analysis only — no fraud classification, queue assignment, or resolution
    - Never fabricates document names or transaction details not in the input
    - Returns ONLY valid parseable JSON — no prose, no markdown
    - Does not overlap with ARIA (classification) or IIA (investigation planning)
    - Cannot approve or reject a dispute
    - All tools read from dispute_cases only — no form data, no account_events

  data_sources:
    - dispute_cases:      "Primary — reads ARIA + IIA output stored here"
    - document_requests:  "Checks fulfilled/pending document requests"
    - transactions:       "validate_evidence_consistency cross-checks amount/merchant"

  # ── LLM config ────────────────────────────────────────────────────────────────
  llm:
    provider: Groq
    model: llama-3.1-8b-instant
    temperature: 0
    max_tokens: 1024
    retry_attempts: 2
    retry_wait: exponential (min 2s, max 10s)

  # ── LangGraph ─────────────────────────────────────────────────────────────────
  langgraph:
    framework: LangGraph (StateGraph)
    pattern: ReAct — Agent-Tools Loop (tools pre-computed server-side)
    state_schema: EvidenceAgentState

    pipeline:
      entry_point: agent
      agent_tools:
        - evaluate_evidence_completeness
        - identify_missing_evidence
        - validate_evidence_consistency
        - assess_evidence_strength
        - determine_next_document_request

    nodes:
      - agent     # LLM synthesises from pre-computed tool results
      - tools     # ToolNode (available if LLM calls tools at runtime)
      - finalize  # Parse LLM JSON, stamp server-owned fields

  # ── Tools ─────────────────────────────────────────────────────────────────────
  tools:
    - name: evaluate_evidence_completeness
      description: >
        Checks investigation_plan.required_documents against fulfilled document_requests.
        Computes completeness score 0–100. Reads dispute_cases and document_requests.
      inputs: [case_id]
      reads: [dispute_cases, document_requests]

    - name: identify_missing_evidence
      description: >
        Returns list of required document types not yet fulfilled.
        Compares investigation_plan.required_documents against document_requests.
      inputs: [case_id]
      reads: [dispute_cases, document_requests]

    - name: validate_evidence_consistency
      description: >
        Validates amount, merchant, transaction type, and date consistency against
        the original transaction record. Cross-checks dispute_cases vs transactions.
      inputs: [case_id]
      reads: [dispute_cases, transactions]

    - name: assess_evidence_strength
      description: >
        Assesses overall evidence strength using: evidence_match from ARIA,
        document completeness score, fulfilled requests count, consistency verdict,
        and data_quality_score from IIA. Returns HIGH | MEDIUM | LOW + numeric score.
      inputs: [case_id]
      reads: [dispute_cases]

    - name: determine_next_document_request
      description: >
        Determines next document to formally request. Checks existing pending
        requests to avoid duplicates. Returns recommended document type and reason.
      inputs: [case_id]
      reads: [dispute_cases, document_requests]

  # ── Output schema ─────────────────────────────────────────────────────────────
  output:
    format: JSON dict (EvidenceAssessment)
    fields:
      evidence_completeness:         "Integer 0-100 — percentage of required evidence present"
      evidence_strength:             "HIGH | MEDIUM | LOW"
      evidence_strength_score:       "Float [0.0, 1.0]"
      evidence_consistent:           "Boolean"
      consistency_issues:            "List of specific inconsistencies (empty if consistent)"
      missing_documents:             "List of required documents not yet submitted"
      recommended_document_requests: "List of documents to formally request"
      investigation_blocked:         "Boolean — true if missing evidence blocks investigation"
      evidence_summary:              "3-5 bullet findings grounded in tool results"
      review_recommendation:         "One sentence — sufficient or additional docs required"
      manual_evidence_review:        "Boolean"
      tool_decisions:                "List of {tool, reason} for each tool called"

  # ── Invocation ────────────────────────────────────────────────────────────────
  invocation:
    entry_function: run_evidence_agent
    file: agents/evidence_agent/__init__.py
    signature: "run_evidence_agent(case_id: str) -> dict"
    called_from:
      - "workflows/dispute_workflow.py → evidence_node (when WOA routes to EVIDENCE_AGENT)"
      - "api/routes/ops_cases.py → reanalyse endpoint"
