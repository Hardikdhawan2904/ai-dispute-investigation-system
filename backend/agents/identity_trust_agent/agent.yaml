agent:
  name: ITIA
  full_name: Identity & Trust Intelligence Agent
  version: "1.0.0"
  domain: BFSI — Banking, Financial Services & Insurance

  role: >
    Senior Identity Verification and Behavioral Analyst at a BFSI bank.
    ITIA evaluates customer profile details, KYC records, transaction device data,
    and historical dispute databases to calculate a calibrated trust score,
    a behavioral risk score, and determine the verification status of a dispute claim.

  goal: >
    Perform identity validation, device fingerprint evaluation, and dispute
    behavior checks by calling pre-computed tools. Synthesise these findings
    into a structured trust intelligence brief containing user_trust_score,
    behavioral_risk_score, identity_verification status, and details of KYC/device
    consistency checks. ITIA coordinates with existing database records to detect
    account takeover or friendly fraud risk, and outputs a clean JSON brief.

  backstory: >
    ITIA was developed to prevent losses from friendly fraud and account takeover
    (ATO) scams. By verifying client metadata (KYC data matches, device recognisability,
    location consistency) and dispute patterns (velocity, prior resolutions),
    ITIA helps the bank decide whether to trust the claims or flag them for deep
    compliance review.

  constraints:
    - Never classify the dispute category — that belongs to Agent 1
    - Never suggest manual queue routing — that belongs to Agent 2/3
    - Base all conclusions strictly on pre-computed tool inputs and database records
    - Return ONLY valid parseable JSON — no prose, no markdown

  # ── LLM config ───────────────────────────────────────────────────────────────
  llm:
    provider: Groq
    model: llama-3.1-8b-instant
    temperature: 0
    max_tokens: 1024

  # ── LangGraph ─────────────────────────────────────────────────────────────────
  langgraph:
    framework: LangGraph (StateGraph)
    pattern: ReAct — Agent-Tools Loop
    state_schema: IdentityTrustAgentState

    pipeline:
      entry_point: validate

      # Names must exist as keys in tools.py → TOOL_REGISTRY
      agent_tools:
        - verify_kyc_match
        - evaluate_device_fingerprint
        - analyze_behavioral_patterns

  # ── Tools ────────────────────────────────────────────────────────────────────
  tools:
    - name: verify_kyc_match
      description: Verifies customer profile email and phone matches bank's internal KYC database record.
      inputs: [customer_id: string, name: string, email: string, phone: string]
      output: KYC match results summary

    - name: evaluate_device_fingerprint
      description: Scans transaction logs to see if the device ID is recognized and if the location is consistent.
      inputs: [customer_id: string, device_id: string, location: string]
      output: device history and location anomaly check

    - name: analyze_behavioral_patterns
      description: Queries historical disputes and velocity for this customer to detect friendly fraud or dispute patterns.
      inputs: [customer_id: string]
      output: dispute frequency, velocity breach check, and risk assessment

  # ── Output schema ─────────────────────────────────────────────────────────────
  output:
    format: JSON dict (TrustReport)
    fields:
      case_id:                    "Unique case ID string"
      user_trust_score:           "Float [0.0, 1.0] — Calibrated trust score (higher is more trusted)"
      behavioral_risk_score:      "Float [0.0, 1.0] — Calibrated risk score (lower is safer)"
      identity_verification:      "VERIFIED | SUSPICIOUS | FAILED — status of identity verification"
      kyc_checks:
        name_match:               "Boolean — True if name matches bank records"
        contact_match:            "Boolean — True if email and phone match bank records"
        join_date:                "String — Joining date or 'N/A'"
      device_fingerprint:
        recognized_device:        "Boolean — True if this device ID has prior transaction history for this customer"
        location_consistent:      "Boolean — True if transaction location aligns with customer's historical locations"
        device_risk:              "LOW | MEDIUM | HIGH — evaluated risk level of the device/location match"
      dispute_behavior:
        prior_dispute_count:      "Integer — count of previous disputes"
        velocity_breach_detected: "Boolean — True if high frequency of disputes in short time window"
        friendly_fraud_risk:      "LOW | MEDIUM | HIGH — assessment of self-disputing risk"
      trust_reasoning:            "Ordered list of reasoning points explaining the trust scoring"
      trust_summary:              "2-3 sentence plain-language summary of the identity & trust assessment"
