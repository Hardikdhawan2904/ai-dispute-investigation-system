agent:
  name: WOA
  full_name: Workflow Orchestration Agent
  version: "1.1.0"
  domain: BFSI — Banking, Financial Services & Insurance

  role: >
    Senior AI Workflow Orchestrator embedded in the bank's multi-agent dispute
    resolution platform. WOA reads ARIA + IIA output from the database and decides
    which specialist agents must run, in what order, and what escalation path the
    case requires. WOA coordinates — it does not investigate.

  goal: >
    Evaluate case complexity, determine required specialist agents, generate an
    ordered execution plan, assess escalation need, estimate workload, and
    identify the immediate next execution step.

  constraints:
    - Never reclassify disputes — classification belongs to ARIA
    - Never build investigation plans — that belongs to IIA
    - Never make approval or resolution decisions
    - If a tool fails, continue and note the failure
    - Returns ONLY valid parseable JSON — no prose, no markdown
    - All 6 tools read exclusively from dispute_cases — no form data
    - COMPLIANCE_AGENT has been removed — high-risk tags trigger escalation only
    - workflow_reasoning must use factual/past tense ("was activated", "triggered")
      NOT action/future tense ("is required", "must be done")

  # ── LLM config ────────────────────────────────────────────────────────────────
  llm:
    provider: Groq
    model: llama-3.1-8b-instant
    temperature: 0
    max_tokens: 1024
    retry_attempts: 2
    retry_wait: exponential (min 2s, max 10s)

  # ── LangGraph ─────────────────────────────────────────────────────────────────
  langgraph:
    framework: LangGraph (StateGraph)
    pattern: ReAct — Agent-Tools Loop
    state_schema: OrchestrationAgentState

    pipeline:
      entry_point: agent
      agent_tools:
        - evaluate_case_complexity
        - determine_required_agents
        - recommend_workflow_path
        - assess_escalation_need
        - estimate_workload
        - determine_next_execution_step

  # ── Tools ─────────────────────────────────────────────────────────────────────
  tools:
    - name: evaluate_case_complexity
      description: >
        Reads case from dispute_cases. Computes orchestration complexity from:
        IIA's investigation_complexity (strongest signal), amount tier, fraud flags,
        high-risk tags. Outputs LOW | MEDIUM | HIGH | CRITICAL.
      inputs: [case_id]
      reads: [dispute_cases]

    - name: determine_required_agents
      description: >
        Identifies required specialist agents based on dispute_category, fraud_suspicion,
        evidence_match, and risk_tags. Routes to FRAUD_AGENT, EVIDENCE_AGENT,
        MERCHANT_AGENT only. COMPLIANCE_AGENT has been removed.
        High-risk tags (VELOCITY_BREACH, SUSPICIOUS_BEHAVIOR, MERCHANT_BLACKLISTED,
        DEVICE_MISMATCH, OTP_COMPROMISED) now trigger escalation, not a compliance agent.
      inputs: [case_id]
      reads: [dispute_cases]
      routing_table:
        FRAUD_AGENT:    "Unauthorized Transaction, Friendly Fraud, fraud_suspicion=true"
        MERCHANT_AGENT: "Merchant Dispute, Refund Not Received, Product Not Received, Subscription Abuse, Duplicate Transaction, Friendly Fraud"
        EVIDENCE_AGENT: "evidence_match != true, required_documents present, ATM Cash Issue, Other"

    - name: recommend_workflow_path
      description: >
        Builds ordered execution sequence for required agents.
        Dependency rule: FRAUD_AGENT always runs first when required.
      inputs: [case_id]
      reads: [dispute_cases]

    - name: assess_escalation_need
      description: >
        Evaluates whether case requires escalation based on complexity, fraud indicators,
        risk tags. High-risk tags now trigger escalation (not COMPLIANCE_AGENT).
      inputs: [case_id]
      reads: [dispute_cases]

    - name: estimate_workload
      description: >
        Estimates investigation hours and analyst seniority based on complexity.
        LOW=1h/JUNIOR, MEDIUM=2h/STANDARD, HIGH=4h/SENIOR, CRITICAL=8h/LEAD.
      inputs: [case_id]
      reads: [dispute_cases]

    - name: determine_next_execution_step
      description: >
        Reads existing workflow_plan (if re-analysis) to find completed agents,
        returns next unexecuted agent. Returns null when all agents complete.
      inputs: [case_id]
      reads: [dispute_cases]

  # ── Specialist agents ─────────────────────────────────────────────────────────
  specialist_agents:
    FRAUD_AGENT:    "Handles Unauthorized Transaction, fraud indicators, identity theft"
    MERCHANT_AGENT: "Handles Merchant Dispute, Refund Not Received, Product Not Received, Subscription Abuse, Duplicate Transaction"
    EVIDENCE_AGENT: "Handles missing evidence, evidence_match=false, ATM Cash Issue, Other"
    # COMPLIANCE_AGENT — REMOVED. High-risk tags trigger escalation instead.

  # ── Output schema ─────────────────────────────────────────────────────────────
  output:
    format: JSON dict (WorkflowPlan)
    fields:
      workflow_complexity:            "LOW | MEDIUM | HIGH | CRITICAL"
      required_agents:               "Ordered list of specialist agent identifiers"
      workflow_path:                 "Ordered execution sequence"
      workflow_status:               "READY | IN_PROGRESS | WAITING | COMPLETED | ESCALATED"
      next_agent:                    "Next agent to execute, or null"
      remaining_agents:              "Agents still to execute after next_agent"
      escalation_required:           "Boolean"
      escalation_level:              "CRITICAL | HIGH | MEDIUM | null"
      manual_review_required:        "Boolean"
      estimated_investigation_hours: "Integer"
      analyst_level:                 "JUNIOR | STANDARD | SENIOR | LEAD"
      workflow_reasoning:            "Factual past-tense rationale for routing decisions"
      completed_agents:              "Agents that have already run (from prior analysis)"

  # ── Invocation ────────────────────────────────────────────────────────────────
  invocation:
    entry_function: run_orchestration_agent
    file: agents/orchestration_agent/__init__.py
    signature: "run_orchestration_agent(case_id: str) -> dict"
    called_from:
      - "workflows/dispute_workflow.py → orchestration_node"
      - "api/routes/ops_cases.py → reanalyse endpoint"
