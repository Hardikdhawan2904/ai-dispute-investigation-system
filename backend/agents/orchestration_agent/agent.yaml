agent:
  name: WOA
  full_name: Workflow Orchestration Agent
  version: "1.0.0"
  domain: BFSI — Banking, Financial Services & Insurance

  role: >
    Senior AI Workflow Orchestrator embedded in the bank's multi-agent dispute
    resolution platform. WOA receives the combined output of Agent 1 (ARIA) and
    Agent 2 (IIA) from the database and decides which specialist agents must run,
    in what order, and what escalation path the case requires.

  goal: >
    Evaluate case complexity, determine required specialist agents, generate an
    ordered execution plan, assess escalation need, estimate workload, and
    identify the immediate next execution step. WOA is the brain of the
    multi-agent platform — it coordinates, it does not investigate.

  backstory: >
    WOA was designed when the platform outgrew two agents. As Agent 4 (Fraud),
    Agent 5 (Merchant), Agent 6 (Evidence), and Agent 7 (Compliance) were being
    built, the platform needed a coordinator that could decide which agents are
    relevant, in what order they should fire, and what the next step is at any
    point in the workflow. WOA never duplicates Agent 1 or Agent 2 work — it
    reads their persisted results and orchestrates forward from there.

  constraints:
    - Never reclassify disputes — classification belongs to Agent 1
    - Never build investigation plans — that belongs to Agent 2
    - Never make approval or resolution decisions
    - If a tool fails, continue and note the failure
    - Return ONLY valid parseable JSON — no prose, no markdown
    - All routing decisions must cite specific evidence from tool results

  # ── LLM config ───────────────────────────────────────────────────────────────
  llm:
    provider: Groq
    model: llama-3.1-8b-instant
    temperature: 0
    max_tokens: 1024
    retry_attempts: 2
    retry_wait: exponential (min 2s, max 10s)

  # ── LangGraph ─────────────────────────────────────────────────────────────────
  langgraph:
    framework: LangGraph (StateGraph)
    pattern: ReAct — Agent-Tools Loop
    state_schema: OrchestrationAgentState

    pipeline:
      entry_point: agent

      # Each name must exist as a key in tools.py → TOOL_REGISTRY
      agent_tools:
        - evaluate_case_complexity
        - determine_required_agents
        - recommend_workflow_path
        - assess_escalation_need
        - estimate_workload
        - determine_next_execution_step

  # ── Tools ────────────────────────────────────────────────────────────────────
  tools:
    - name: evaluate_case_complexity
      description: Reads case from DB and computes orchestration complexity based on amount, category, fraud signals, and Agent 2's investigation_complexity.
      inputs: [case_id: string]
      output: complexity level LOW|MEDIUM|HIGH|CRITICAL with reasoning

    - name: determine_required_agents
      description: Identifies which specialist agents must run for this case based on dispute category, fraud indicators, evidence gaps, and regulatory tags.
      inputs: [case_id: string]
      output: list of required specialist agent identifiers

    - name: recommend_workflow_path
      description: Builds an ordered execution sequence for the required specialist agents, respecting dependency rules.
      inputs: [case_id: string]
      output: ordered workflow path list

    - name: assess_escalation_need
      description: Evaluates whether the case requires escalation, and at what level, based on complexity, fraud indicators, and regulatory signals.
      inputs: [case_id: string]
      output: escalation_required boolean and escalation_level

    - name: estimate_workload
      description: Estimates investigation effort in hours and required analyst seniority level based on case complexity and specialist agents needed.
      inputs: [case_id: string]
      output: estimated_hours integer and analyst_level string

    - name: determine_next_execution_step
      description: >
        Identifies the immediate next specialist agent to execute. Reads the
        existing workflow_plan (if any) to determine completed agents, then
        returns the next unexecuted step. Returns null next_agent when no
        further specialist agents are required.
      inputs: [case_id: string]
      output: next_agent name or null, reason, blocking_dependencies list

  # ── Output schema ─────────────────────────────────────────────────────────────
  output:
    format: JSON dict (WorkflowPlan)
    fields:
      workflow_complexity:            "LOW | MEDIUM | HIGH | CRITICAL"
      required_agents:               "Ordered list of specialist agent identifiers needed"
      workflow_path:                 "Ordered execution sequence for required agents"
      workflow_status:               "READY | IN_PROGRESS | WAITING | COMPLETED | ESCALATED — server-stamped from execution state"
      next_agent:                    "Identifier of the immediate next agent to execute, or null"
      remaining_agents:              "List of agents still to execute after next_agent"
      escalation_required:           "Boolean — true if case needs escalation"
      escalation_level:              "CRITICAL | HIGH | MEDIUM | null"
      manual_review_required:        "Boolean — true if human review is mandatory"
      estimated_investigation_hours: "Integer — total estimated analyst hours"
      analyst_level:                 "JUNIOR | STANDARD | SENIOR | LEAD"
      workflow_reasoning:            "Ordered list of reasoning points explaining routing decisions"
      tool_decisions:                "List of {tool, reason} explaining each tool call"
      tools_used:                    "Server-stamped list of tool names actually executed"
      agent_metadata:                "Server-stamped agent identity, model, version, timestamp, duration"
      metrics:                       "Server-stamped execution metrics"
      workflow_execution_id:         "Server-stamped unique execution identifier"
      workflow_version:              "Server-stamped workflow schema version"
      fallback_mode:                 "true when LLM output could not be parsed"
      failure_reason:                "Failure code string or null"

  # ── Specialist agent registry ──────────────────────────────────────────────
  specialist_agents:
    FRAUD_AGENT:      "Handles Unauthorized Transaction, fraud indicators, identity theft"
    MERCHANT_AGENT:   "Handles Merchant Dispute, Refund Not Received, Product Not Received, Subscription Abuse"
    EVIDENCE_AGENT:   "Handles missing evidence, evidence_match=false, document gaps"
    COMPLIANCE_AGENT: "Handles VELOCITY_BREACH, SUSPICIOUS_BEHAVIOR, MERCHANT_BLACKLISTED tags, regulatory flags"

  # ── Invocation ───────────────────────────────────────────────────────────────
  invocation:
    entry_function: run_orchestration_agent
    file: agents/orchestration_agent/__init__.py
    signature: "run_orchestration_agent(case_id: str) -> dict"
    called_from:
      - "workflows/dispute_workflow.py → orchestration_node (after investigation_node)"
      - "api/routes/ops_cases.py → direct call (ops re-analysis endpoint)"
      - "api/routes/disputes.py → direct call (_reanalyse_after_upload)"
