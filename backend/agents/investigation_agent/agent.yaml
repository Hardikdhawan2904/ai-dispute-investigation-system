agent:
  name: IIA
  full_name: Investigation Intelligence Agent
  version: "1.2.0"
  domain: BFSI — Banking, Financial Services & Insurance

  role: >
    Senior AI Investigation Planner embedded in the bank's internal dispute operations
    platform. IIA receives ARIA's structured classification output from the database
    and builds a complete investigation intelligence brief by querying internal DB tables.

  goal: >
    Gather investigative intelligence on every classified dispute by calling 4 DB tools,
    synthesise findings into a structured investigation plan, recommend the correct
    queue and required documents, and flag manual review requirements.
    IIA does NOT reclassify disputes — classification is ARIA's responsibility.

  constraints:
    - Never reclassify or override ARIA dispute_category
    - Never give legal or financial advice
    - If a tool fails, continue investigation and note the failure
    - Express uncertainty via a lower confidence_score — never suppress it
    - Returns ONLY valid parseable JSON — no prose, no markdown
    - All 4 tools read exclusively from DB — no form data used

  data_sources:
    - dispute_history:   "600+ pre-seeded historical resolved disputes"
    - dispute_cases:     "Live cases submitted through the system"
    - merchant_profiles: "Bank merchant risk profiles with complaint stats"
    - transactions:      "11,000+ customer transaction records"

  # ── LLM config ────────────────────────────────────────────────────────────────
  llm:
    provider: Groq
    model: llama-3.1-8b-instant
    temperature: 0
    max_tokens: 2048
    retry_attempts: 3
    retry_wait: exponential (min 2s, max 10s)

  # ── LangGraph ─────────────────────────────────────────────────────────────────
  langgraph:
    framework: LangGraph (StateGraph)
    pattern: ReAct — Agent-Tools Loop
    state_schema: InvestigationAgentState

    pipeline:
      entry_point: agent
      agent_tools:
        - lookup_customer_history
        - check_merchant_risk
        - find_duplicate_transaction
        - lookup_related_cases

  # ── Tools ─────────────────────────────────────────────────────────────────────
  tools:
    - name: lookup_customer_history
      description: >
        Queries dispute_cases + dispute_history for this customer's full dispute record.
        Returns: total disputes, fraud-flag count, 30-day velocity, top categories,
        resolution rate, and risk level (LOW/MEDIUM/HIGH/CRITICAL).
        Active case is automatically excluded server-side.
      inputs: [customer_id]
      reads: [dispute_cases, dispute_history]

    - name: check_merchant_risk
      description: >
        Queries merchant_profiles for risk tier, then cross-checks dispute_cases
        and dispute_history for customer complaints against this merchant.
        Returns: fraud_complaint_count, resolution_rate, risk_level, blacklisted flag.
      inputs: [merchant_name]
      reads: [merchant_profiles, dispute_cases, dispute_history]

    - name: find_duplicate_transaction
      description: >
        Detects duplicate or near-duplicate disputes by exact transaction_id match,
        or by customer + merchant + amount within a 72-hour window.
        Returns: duplicate_found (bool) + related_case_id if found.
      inputs: [transaction_id, customer_id, amount, merchant]
      reads: [dispute_cases, transactions]

    - name: lookup_related_cases
      description: >
        Searches dispute_history and dispute_cases for cases with the same
        dispute_category. Optionally filters by merchant.
        Returns: similar_case_count, resolution outcomes, resolution_rate.
      inputs: [dispute_category, merchant (optional)]
      reads: [dispute_history, dispute_cases]

  # ── Output schema ─────────────────────────────────────────────────────────────
  output:
    format: JSON dict (InvestigationReport)
    fields:
      case_id:                    "Unique identifier from ARIA output"
      recommended_queue:          "CRITICAL_QUEUE | FRAUD_QUEUE | HIGH_VALUE_QUEUE | MERCHANT_QUEUE | ATM_QUEUE | STANDARD_QUEUE"
      queue_confidence:           "Float [0.0, 1.0]"
      investigation_complexity:   "LOW | MEDIUM | HIGH | CRITICAL"
      manual_review_required:     "Boolean"
      customer_risk_profile:      "Structured customer history and risk assessment"
      merchant_risk_profile:      "Structured merchant complaint history and risk level"
      duplicate_found:            "Boolean"
      related_case_id:            "Case ID of duplicate if found, else null"
      related_cases:              "Historical resolution statistics for this dispute type"
      required_documents:         "List of documents to request from customer"
      recommended_steps:          "Ordered list of investigation actions for the analyst"
      investigation_reasoning:    "Ordered list of key findings from tool calls"
      investigation_summary:      "2-3 sentence plain-language investigation brief"
      manual_review_reason:       "List of reasons — empty when not required"
      investigation_coverage:     "Server-stamped: boolean flag per tool indicating if called"
      tools_used:                 "Server-stamped list of tool names executed"
      agent_metadata:             "Server-stamped agent identity, model, version, timestamp"
      confidence_score:           "Float [0.0, 1.0]"

  queues:
    CRITICAL_QUEUE:   "fraud_suspicion=true AND amount > 50,000 OR identity theft"
    FRAUD_QUEUE:      "fraud_suspicion=true"
    HIGH_VALUE_QUEUE: "amount > 50,000 and no fraud suspicion"
    MERCHANT_QUEUE:   "Merchant Dispute, Refund Not Received, Product/Subscription"
    ATM_QUEUE:        "ATM Cash Issue"
    STANDARD_QUEUE:   "All other cases"

  # ── Invocation ────────────────────────────────────────────────────────────────
  invocation:
    entry_function: run_investigation_agent
    file: agents/investigation_agent/__init__.py
    signature: "run_investigation_agent(agent1_output: dict) -> dict"
    called_from:
      - "workflows/dispute_workflow.py → investigation_node"
      - "api/routes/ops_cases.py → reanalyse endpoint"
