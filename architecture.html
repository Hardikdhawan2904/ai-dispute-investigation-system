<button class="dl-btn" onclick="copyJPG(this)">⎘ Copy Image</button>
<script>
function copyJPG(btn) {
  const svg = document.querySelector("svg");
  const w = 1200, h = 960;
  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], {type: "image/svg+xml"});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement("canvas");
    canvas.width = w * 2; canvas.height = h * 2;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#0f0f0f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.scale(2, 2);
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(jpgBlob) {
      navigator.clipboard.write([new ClipboardItem({"image/png": jpgBlob})]).then(function() {
        btn.textContent = "✓ Copied!";
        setTimeout(function() { btn.textContent = "⎘ Copy Image"; }, 2000);
      });
    }, "image/png");
  };
  img.src = url;
}
</script>
